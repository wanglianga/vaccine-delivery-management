services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vaccine-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/batches"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaccine-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
